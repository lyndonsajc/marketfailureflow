<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Failure Decision Flow</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#f8fafc,#dbeafe,#e0e7ff);
color:#0f172a;
}

.container{
max-width:1200px;
margin:auto;
padding:24px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 320px;
gap:20px;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
.options{
grid-template-columns:1fr !important;
}
}

h1{
margin:0;
font-size:38px;
color:#312e81;
}

.subtitle{
margin-top:10px;
color:#475569;
}

.step-pill{
display:inline-block;
padding:10px 18px;
border-radius:999px;
background:#e0e7ff;
color:#4338ca;
font-weight:bold;
margin-bottom:18px;
}

.options{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-top:20px;
}

.option-btn{
border:none;
background:white;
border-radius:20px;
padding:22px;
text-align:left;
cursor:pointer;
border:2px solid #e0e7ff;
transition:0.2s;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.option-btn:hover{
transform:translateY(-2px);
background:#eef2ff;
}

.option-title{
font-size:20px;
font-weight:800;
}

.option-sub{
margin-top:8px;
font-size:14px;
color:#64748b;
}

.result-box{
display:inline-block;
padding:14px 24px;
border-radius:20px;
font-size:30px;
font-weight:900;
margin-bottom:18px;
}

.over{
background:#fee2e2;
color:#991b1b;
}

.under{
background:#dbeafe;
color:#1e3a8a;
}

.history-item{
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:18px;
padding:14px;
margin-bottom:12px;
}

.history-answer{
margin-top:10px;
color:#4338ca;
font-weight:bold;
}

.step-card{
display:flex;
gap:14px;
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:18px;
padding:14px;
margin-bottom:12px;
}

.step-number{
width:38px;
height:38px;
border-radius:50%;
background:#4338ca;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
flex-shrink:0;
}

.restart-btn{
margin-top:20px;
border:none;
background:#4338ca;
color:white;
padding:14px 24px;
border-radius:18px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.restart-btn:hover{
background:#312e81;
}

svg{
width:100%;
max-width:760px;
display:block;
margin:auto;
background:white;
border:1px solid #e2e8f0;
border-radius:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Market Failure Decision Flow</h1>
<p class="subtitle">
Choose the correct pathway to identify the market failure outcome.
</p>
</div>

<div class="grid">

<div class="card" id="main"></div>

<div class="card">
<h2>Your pathway</h2>
<div id="history"></div>
</div>

</div>

</div>

<script>

const flow={

start:{
title:"Step 1",
question:"What type of market failure is shown?",
options:[
["Externality","externality"],
["Information gap","infoGap"]
]
},

externality:{
title:"Step 2",
question:"Is it on the cost side or benefit side?",
options:[
["Cost side","externalCost"],
["Benefit side","externalBenefit"]
]
},

externalCost:{
title:"Step 3",
question:"Is consumption or production causing the external cost?",
options:[
["Consumption causes external cost","overconsumption"],
["Production causes external cost","overproduction"]
]
},

externalBenefit:{
title:"Step 3",
question:"Is consumption or production creating the external benefit?",
options:[
["Consumption creates external benefit","underconsumption"],
["Production creates external benefit","underproduction"]
]
},

infoGap:{
title:"Step 2",
question:"Is the information gap on the cost or benefit side?",
options:[
["Cost side","infoCost"],
["Benefit side","infoBenefit"]
]
},

infoCost:{
title:"Step 3",
question:"Are consumers underestimating or overestimating true cost?",
options:[
["Underestimate true cost","overconsumption"],
["Overestimate true cost","underconsumption"]
]
},

infoBenefit:{
title:"Step 3",
question:"Are consumers underestimating or overestimating true benefit?",
options:[
["Underestimate true benefit","underconsumption"],
["Overestimate true benefit","overconsumption"]
]
}

};

const outcomes={

overconsumption:{
title:"Overconsumption",
class:"over",
diagram:"cost",
explanation:"QP is greater than QS. The free market consumes more than the socially optimal quantity.",
steps:[
"Negative externalities in consumption occur when external costs are imposed on third parties from consumption.",
"Consumers enjoy private benefits while incurring private costs.",
"Consumption also imposes external costs on third parties.",
"MEC > 0, so MSC is higher than MPC.",
"Assuming no external benefits, MPB = MSB.",
"The free market equilibrium occurs at QP where MPB = MPC. The social optimum occurs at QS where MSB = MSC.",
"Since QP > QS, there is overconsumption and deadweight loss."
]
},

overproduction:{
title:"Overproduction",
class:"over",
diagram:"cost",
explanation:"QP is greater than QS. The free market produces more than the socially optimal quantity.",
steps:[
"Negative externalities in production occur when external costs are imposed on third parties from production.",
"Producers enjoy private benefits while incurring private costs.",
"Production also imposes external costs on third parties.",
"MEC > 0, so MSC is higher than MPC.",
"Assuming no external benefits, MPB = MSB.",
"The free market equilibrium occurs at QP where MPB = MPC. The social optimum occurs at QS where MSB = MSC.",
"Since QP > QS, there is overproduction and deadweight loss."
]
},

underconsumption:{
title:"Underconsumption",
class:"under",
diagram:"benefit",
explanation:"QP is less than QS. The free market consumes less than the socially optimal quantity.",
steps:[
"Positive externalities in consumption occur when external benefits are enjoyed by third parties.",
"Consumers enjoy private benefits while incurring private costs.",
"Consumption also creates external benefits for third parties.",
"MEB > 0, so MSB is higher than MPB.",
"Assuming no external costs, MPC = MSC.",
"The free market equilibrium occurs at QP where MPB = MPC. The social optimum occurs at QS where MSB = MSC.",
"Since QP < QS, there is underconsumption and deadweight loss."
]
},

underproduction:{
title:"Underproduction",
class:"under",
diagram:"benefit",
explanation:"QP is less than QS. The free market produces less than the socially optimal quantity.",
steps:[
"Positive externalities in production occur when external benefits are enjoyed by third parties.",
"Producers enjoy private benefits while incurring private costs.",
"Production also creates external benefits for third parties.",
"MEB > 0, so MSB is higher than MPB.",
"Assuming no external costs, MPC = MSC.",
"The free market equilibrium occurs at QP where MPB = MPC. The social optimum occurs at QS where MSB = MSC.",
"Since QP < QS, there is underproduction and deadweight loss."
]
}

};

let current="start";
let history=[];

function drawDiagram(type){

if(type==="cost"){

return `
<svg viewBox="0 0 520 360">

<line x1="70" y1="310" x2="470" y2="310" stroke="#334155" stroke-width="2"/>
<line x1="70" y1="310" x2="70" y2="45" stroke="#334155" stroke-width="2"/>

<text x="475" y="315" font-weight="bold">Quantity</text>
<text x="20" y="40" font-weight="bold">Cost / Benefit</text>

<line x1="90" y1="285" x2="430" y2="95" stroke="#2563eb" stroke-width="3"/>
<text x="395" y="100" fill="#2563eb" font-weight="bold">MPC</text>

<line x1="90" y1="220" x2="430" y2="45" stroke="#dc2626" stroke-width="3"/>
<text x="395" y="50" fill="#dc2626" font-weight="bold">MSC</text>

<line x1="90" y1="80" x2="430" y2="275" stroke="#16a34a" stroke-width="3"/>
<text x="320" y="285" fill="#16a34a" font-weight="bold">MPB = MSB</text>

<!-- CORRECT DWL -->
<polygon
points="220,205 271,178 271,128"
fill="#ef4444"
opacity="0.35"
stroke="#dc2626"
stroke-width="2"/>

<text x="240" y="170" fill="#b91c1c" font-weight="bold">DWL</text>

<line x1="220" y1="310" x2="220" y2="205" stroke="#64748b" stroke-dasharray="5,5"/>
<line x1="271" y1="310" x2="271" y2="128" stroke="#64748b" stroke-dasharray="5,5"/>

<text x="205" y="335" font-weight="bold">QS</text>
<text x="256" y="335" font-weight="bold">QP</text>

</svg>
`;

}

return `
<svg viewBox="0 0 520 360">

<line x1="70" y1="310" x2="470" y2="310" stroke="#334155" stroke-width="2"/>
<line x1="70" y1="310" x2="70" y2="45" stroke="#334155" stroke-width="2"/>

<text x="475" y="315" font-weight="bold">Quantity</text>
<text x="20" y="40" font-weight="bold">Cost / Benefit</text>

<line x1="90" y1="285" x2="430" y2="95" stroke="#2563eb" stroke-width="3"/>
<text x="310" y="100" fill="#2563eb" font-weight="bold">MPC = MSC</text>

<line x1="90" y1="80" x2="430" y2="275" stroke="#16a34a" stroke-width="3"/>
<text x="395" y="285" fill="#16a34a" font-weight="bold">MPB</text>

<line
x1="90"
y1="25"
x2="430"
y2="215"
stroke="#059669"
stroke-width="3"
stroke-dasharray="8,5"/>

<text x="395" y="220" fill="#059669" font-weight="bold">MSB</text>

<!-- CORRECT DWL -->
<polygon
points="271,178 271,128 320,150"
fill="#ef4444"
opacity="0.35"
stroke="#dc2626"
stroke-width="2"/>

<text x="286" y="155" fill="#b91c1c" font-weight="bold">DWL</text>

<line x1="271" y1="310" x2="271" y2="178" stroke="#64748b" stroke-dasharray="5,5"/>
<line x1="320" y1="310" x2="320" y2="150" stroke="#64748b" stroke-dasharray="5,5"/>

<text x="256" y="335" font-weight="bold">QP</text>
<text x="305" y="335" font-weight="bold">QS</text>

</svg>
`;

}

function render(){

const main=document.getElementById("main");
const historyDiv=document.getElementById("history");

if(outcomes[current]){

const outcome=outcomes[current];

main.innerHTML=`

<div class="result-box ${outcome.class}">
${outcome.title}
</div>

<h2>
${outcome.explanation}
</h2>

${drawDiagram(outcome.diagram)}

<div style="margin-top:24px;">

<h2>
7-Step Economic Explanation
</h2>

${outcome.steps.map((step,index)=>`

<div class="step-card">

<div class="step-number">
${index+1}
</div>

<div>
${step}
</div>

</div>

`).join("")}

</div>

<button class="restart-btn" onclick="resetFlow()">
Restart
</button>

`;

}else{

const node=flow[current];

main.innerHTML=`

<div class="step-pill">
${node.title}
</div>

<h2>
${node.question}
</h2>

<div class="options">

${node.options.map(option=>`

<button
class="option-btn"
onclick="choose('${option[1]}','${option[0]}')">

<div class="option-title">
${option[0]}
</div>

<div class="option-sub">
Click to continue
</div>

</button>

`).join("")}

</div>

`;

}

historyDiv.innerHTML=
history.length===0
? "<p style='color:#64748b;'>Your choices will appear here.</p>"
: history.map((item,index)=>`

<div class="history-item">

<div>
<b>Step ${index+1}</b>
</div>

<div style="margin-top:8px;">
${item.question}
</div>

<div class="history-answer">
→ ${item.answer}
</div>

</div>

`).join("");

}

function choose(next,answer){

history.push({
question:flow[current].question,
answer
});

current=next;

render();

}

function resetFlow(){

current="start";
history=[];

render();

}

render();

</script>

</body>
</html>
